<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel 2 - The Problem</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: #e2e8f0; 
            display: flex; justify-content: center; align-items: center; 
            transition: opacity 0.5s ease; 
        }
        
        /* Tri-fold proportion */
        .panel { 
            height: 85vh; 
            aspect-ratio: 3.66 / 8.5; 
            background-color: #ffffff; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            padding: 2.5rem 1.5rem; 
            box-sizing: border-box; 
            display: flex; flex-direction: column; justify-content: center; 
        }

        .badge { 
            display: inline-block; border: 1px solid rgba(217, 48, 37, 0.3); 
            color: #d93025; font-size: 0.65rem; font-weight: 800; 
            letter-spacing: 0.1em; text-transform: uppercase; 
            padding: 6px 12px; border-radius: 4px; 
            background: rgba(217, 48, 37, 0.04); 
            margin-bottom: 15px; align-self: flex-start; 
        }

        /* Typography scaled down to fit */
        h1 { 
            color: #0f172a; font-size: 2rem; font-weight: 800; 
            line-height: 1.1; margin: 0 0 30px 0; letter-spacing: -0.02em;
        }

        .pillar { 
            display: flex; gap: 15px; margin-bottom: 25px; align-items: flex-start;
        }

        .icon { 
            font-size: 18px; color: #d93025; font-weight: bold; margin-top: 2px;
        }

        h3 { 
            color: #0f172a; font-size: 1rem; font-weight: 800; margin: 0 0 5px 0; 
        }

        p { 
            color: #475569; font-size: 0.85rem; line-height: 1.4; margin: 0; 
        }

        /* Navigation Buttons floating outside the panel */
        .nav-btn { 
            position: absolute; bottom: 5vh; 
            background: #ffffff; border: none; color: #0f172a; 
            font-size: 14px; font-weight: 800; letter-spacing: 0.1em; 
            text-transform: uppercase; cursor: pointer; transition: all 0.3s; 
            padding: 12px 24px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .nav-btn.prev { left: 5vw; }
        .nav-btn.next { right: 5vw; }

        .nav-btn:hover { 
            background: #0f172a;
            color: #ffffff;
        }

        .fade-out { opacity: 0; transform: translateX(-20px); }
    </style>
</head>
<body>
    
    <div class="panel">
        <div class="badge">Health Hazard</div>
        <h1>Generic cleaning<br>fails in Houston<span style="color:#d93025;">.</span></h1>
        
        <div class="pillar">
            <div class="icon">✕</div>
            <div>
                <h3>Cross-Contamination</h3>
                <p>Using the same tools for restrooms and waiting areas puts staff and patients at risk.</p>
            </div>
        </div>
        
        <div class="pillar">
            <div class="icon">✕</div>
            <div>
                <h3>The "Looks Clean" Illusion</h3>
                <p>Quick vacuuming isn't enough. Dust accumulation on medical tech damages your credibility.</p>
            </div>
        </div>
    </div>

    <button class="nav-btn prev" onclick="nav('side1.html')">← Back</button>
    <button class="nav-btn next" onclick="nav('side3.html')">Next →</button>

    <script>
        function nav(url) { 
            document.body.classList.add('fade-out'); 
            setTimeout(() => window.location.href = url, 400); 
        }
        document.addEventListener('keydown', e => { 
            if (e.key === 'ArrowRight') nav('side3.html'); 
            else if (e.key === 'ArrowLeft') nav('side1.html'); 
        });
    </script>
</body>
</html>
