<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel 1 - Cover</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: #e2e8f0; 
            display: flex; justify-content: center; align-items: center; 
            transition: opacity 0.5s ease; 
        }
        
        /* Tri-fold proportion: 3.66 inches wide by 8.5 inches tall */
        .panel { 
            height: 85vh; 
            aspect-ratio: 3.66 / 8.5; 
            background-color: #ffffff; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; 
            padding: 2rem;
            box-sizing: border-box;
        }

        .logo-box { 
            width: 60px; height: 60px; 
            background: #0D9488; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 30px; font-weight: 900; border-radius: 12px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 20px rgba(13,148,136,0.2); 
        }

        /* Typography scaled down to fit the narrow layout */
        h1 { 
            color: #0f172a; font-size: 2.2rem; font-weight: 900; 
            letter-spacing: -0.02em; margin: 0 0 15px 0; 
            text-transform: uppercase; line-height: 1.1;
        }

        h2 { 
            color: #0D9488; font-size: 0.85rem; font-weight: 600; 
            letter-spacing: 0.1em; margin: 0; 
            text-transform: uppercase; line-height: 1.4;
        }

        /* Nav button positioned outside the panel, anchored to the screen */
        .nav-btn { 
            position: absolute; bottom: 5vh; right: 5vw; 
            background: #ffffff; border: none; color: #0f172a; 
            font-size: 14px; font-weight: 800; letter-spacing: 0.1em; 
            text-transform: uppercase; cursor: pointer; transition: all 0.3s; 
            padding: 12px 24px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .nav-btn:hover { 
            background: #0f172a;
            color: #ffffff;
        }

        .fade-out { opacity: 0; transform: translateX(-20px); }
    </style>
</head>
<body>
    
    <div class="panel">
        <div class="logo-box">K</div>
        <h1>Kassandra's</h1>
        <h2>Professional<br>Office Cleaning</h2>
    </div>

    <button class="nav-btn" onclick="nav('side2.html')">Open →</button>

    <script>
        function nav(url) { 
            document.body.classList.add('fade-out'); 
            setTimeout(() => window.location.href = url, 400); 
        }
        document.addEventListener('keydown', e => { 
            if (e.key === 'ArrowRight' || e.key === ' ') nav('side2.html'); 
        });
    </script>
</body>
</html>
